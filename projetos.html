        const $enableMobileMenuButton = document.querySelector('.mobile-menu-icon');
        const $mobileMenu = document.querySelector('.mobile-menu');

        function toggleMobileMenu() {
            const currentDisplay = $mobileMenu.style.display;
            $mobileMenu.style.display = currentDisplay === 'block' ? 'none' : 'block';

        $enableMobileMenuButton.addEventListener('click', toggleMobileMenu);
        $mobileMenu.querySelectorAll('li').forEach((e) => e.addEventListener('click', toggleMobileMenu));
